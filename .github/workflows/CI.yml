name: CI
on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup tools (mise)
        uses: jdx/mise-action@71c0f0ac17abbafcd73c2c637b6f7a5c2c8162c1
        with:
          cache: true
          experimental: true

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@85fb4247b71961ec8fe7c885c0814d47486c6ce0

      - name: Run build
        id: build
        run: mise build

      - name: Run tests
        id: tests
        run: mise test

      - name: Report CI result in PR
        if: always()
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a
        with:
          script: |
            const report = require('./.github/scripts/report-ci.js');
            await report({ github, context, process });
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}